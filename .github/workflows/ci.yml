name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: validate actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: action.yml files are valid YAML and declare composite runs
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          ok = True
          for f in sorted(glob.glob('*/action.yml')):
              d = yaml.safe_load(open(f))
              using = (d.get('runs') or {}).get('using')
              status = 'OK' if using == 'composite' else f'NOT composite ({using})'
              if using != 'composite':
                  ok = False
              print(f'{f}: {status}')
          sys.exit(0 if ok else 1)
          PY
