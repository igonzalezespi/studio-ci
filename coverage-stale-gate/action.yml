name: coverage-stale-gate
description: >-
  Stateless throttle for an activity-driven coverage workflow. Queries this repo's own run
  history for the target coverage workflow on the target branch and reports stale=true when the
  last SUCCESSFUL run is older than max-age-days (default 7) or there has never been one. Lets a
  push-triggered coverage job run at most once per window with no cron and no state file — built
  for self-hosted desktop runners that are off at night. The calling job needs actions:read.

inputs:
  workflow:
    description: "Coverage workflow file name or id (e.g. coverage.yml)."
    required: true
  branch:
    description: "Branch whose last successful coverage run we measure."
    required: false
    default: develop
  max-age-days:
    description: "Run coverage only if the last success is at least this many days old."
    required: false
    default: "7"
  github-token:
    description: "Token with actions:read (defaults to the job's GITHUB_TOKEN)."
    required: false
    default: ${{ github.token }}

outputs:
  stale:
    description: "'true' -> coverage should run; 'false' -> throttled (a recent success exists)."
    value: ${{ steps.check.outputs.stale }}
  last-success:
    description: "ISO-8601 timestamp of the last successful run, or empty if never."
    value: ${{ steps.check.outputs.last_success }}

runs:
  using: composite
  steps:
    - name: Check staleness
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
        WF: ${{ inputs.workflow }}
        BRANCH: ${{ inputs.branch }}
        MAX_AGE_DAYS: ${{ inputs.max-age-days }}
      run: |
        set -euo pipefail
        # The last SUCCESSFUL completion of this coverage workflow on this branch IS the state —
        # no artifact, no cache, no committed timestamp to keep in sync.
        last=$(gh run list \
          --repo "$GH_REPO" \
          --workflow "$WF" \
          --branch "$BRANCH" \
          --status success \
          --limit 1 \
          --json createdAt \
          --jq '.[0].createdAt // ""')

        if [ -z "$last" ]; then
          echo "coverage-stale-gate: no prior successful run on $BRANCH -> STALE (first run)"
          echo "stale=true"   >> "$GITHUB_OUTPUT"
          echo "last_success=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        now_s=$(date -u +%s)
        last_s=$(date -u -d "$last" +%s)
        age_days=$(( (now_s - last_s) / 86400 ))

        if [ "$age_days" -ge "$MAX_AGE_DAYS" ]; then
          echo "coverage-stale-gate: last success $last (${age_days}d ago, >= ${MAX_AGE_DAYS}d) -> STALE"
          echo "stale=true" >> "$GITHUB_OUTPUT"
        else
          echo "coverage-stale-gate: last success $last (${age_days}d ago, < ${MAX_AGE_DAYS}d) -> throttled"
          echo "stale=false" >> "$GITHUB_OUTPUT"
        fi
        echo "last_success=$last" >> "$GITHUB_OUTPUT"
